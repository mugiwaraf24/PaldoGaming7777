<!DOCTYPE html>
<html>
<head>
  <title>PaldoGaming</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #18191a; /* dark background */
      color: #fff;
      text-align: center;
    }
    .hero {
      padding: 80px 20px;
    }
    .hero h1 {
      font-size: 48px;
      color: #1877f2; /* Facebook blue */
      margin-bottom: 20px;
    }
    .hero p {
      font-size: 20px;
      margin-bottom: 40px;
    }
    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 14px 24px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      border: none;
    }
    .btn-start {
      background: #42b72a; /* Facebook green */
      color: #fff;
    }
    .btn-login {
      background: #1877f2;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Welcome to PaldoGaming</h1>
    <p>Your hub for anime, gaming, and community.</p>
    <div class="buttons">
      <button class="btn btn-start" onclick="location.href='login.html'">Get Started</button>
      <button class="btn btn-login" onclick="location.href='login.html'">Log In</button>
    </div>
  </div>
</body>
</html>
